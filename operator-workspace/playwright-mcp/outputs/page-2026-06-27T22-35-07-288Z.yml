        - paragraph [ref=e304]: Our radios are made for standard double DIN radio openings. Use the fitment checker above to enter your year, make, and model before placing your order.
      - article [ref=e305]:
        - heading "Do I need a dash kit?" [level=3] [ref=e306]
        - paragraph [ref=e307]: Most vehicles need a vehicle-specific bezel, dash kit, or harness adapter. The order form collects your vehicle info so the correct parts can be matched to your kit.
